# Astra local stack.
#
# Starts MatrixOne, Memoria, and the Astra API server from published images.
# Use from the repository root:
#   make stack-env
#   make stack-up

services:
  matrixone-init:
    image: ${MATRIXONE_IMAGE:-matrixorigin/matrixone:latest}
    user: root
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        if ! grep -qx "${HOST_UID:-1000}:${HOST_GID:-1000}" /mo-data/.astra-owner 2>/dev/null; then
          chown -R "${HOST_UID:-1000}:${HOST_GID:-1000}" /mo-data
          printf '%s\n' "${HOST_UID:-1000}:${HOST_GID:-1000}" > /mo-data/.astra-owner
          chown "${HOST_UID:-1000}:${HOST_GID:-1000}" /mo-data/.astra-owner
        fi
        mkdir -p /mo-logs
        chown "${HOST_UID:-1000}:${HOST_GID:-1000}" /mo-logs
    volumes:
      - matrixone-data:/mo-data
      - ${MATRIXONE_LOG_DIR:-./data/matrixone/logs}:/mo-logs
    networks:
      - astra-net
    restart: "no"

  matrixone:
    image: ${MATRIXONE_IMAGE:-matrixorigin/matrixone:latest}
    hostname: matrixone
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      matrixone-init:
        condition: service_completed_successfully
    entrypoint: /entrypoint.sh
    command: []
    ports:
      - "${MATRIXONE_BIND:-127.0.0.1}:${MATRIXONE_PORT:-26001}:6001"
      - "${MATRIXONE_DEBUG_HTTP_BIND:-127.0.0.1}:${MATRIXONE_DEBUG_HTTP_PORT:-26060}:6060"
    volumes:
      - matrixone-data:/mo-data
      - ${MATRIXONE_LOG_DIR:-./data/matrixone/logs}:/mo-logs
      - ./matrixone-entrypoint.sh:/entrypoint.sh:ro
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:6060/debug/vars"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  memoria:
    image: ${MEMORIA_IMAGE:-matrixorigin/memoria:latest}
    hostname: memoria
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${MEMORIA_BIND:-127.0.0.1}:${MEMORIA_PORT:-8100}:8100"
    environment:
      RUST_LOG: ${MEMORIA_RUST_LOG:-info}
      DATABASE_URL: mysql://${MATRIXONE_USER:-root}:${MATRIXONE_PASSWORD:-111}@matrixone:6001/${MEMORIA_DB_NAME:-memoria}
      MASTER_KEY: ${MEMORIA_MASTER_KEY:?Set MEMORIA_MASTER_KEY in deployment/astra-stack/.env}
      EMBEDDING_PROVIDER: ${MEMORIA_EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${MEMORIA_EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIM: ${MEMORIA_EMBEDDING_DIM:-1024}
      EMBEDDING_API_KEY: ${MEMORIA_EMBEDDING_API_KEY:?Set MEMORIA_EMBEDDING_API_KEY in deployment/astra-stack/.env}
      EMBEDDING_BASE_URL: ${MEMORIA_EMBEDDING_BASE_URL:?Set MEMORIA_EMBEDDING_BASE_URL in deployment/astra-stack/.env}
      EMBEDDING_ENDPOINTS: ${MEMORIA_EMBEDDING_ENDPOINTS:-}
      LLM_API_KEY: ${MEMORIA_LLM_API_KEY:-}
      LLM_BASE_URL: ${MEMORIA_LLM_BASE_URL:-}
      LLM_MODEL: ${MEMORIA_LLM_MODEL:-gpt-4o-mini}
      ENTITY_WORKER_COUNT: ${ENTITY_WORKER_COUNT:-4}
      ENTITY_POOL_SIZE: ${ENTITY_POOL_SIZE:-8}
      ENTITY_QUEUE_SIZE: ${ENTITY_QUEUE_SIZE:-512}
      MEMORIA_INSTANCE_ID: ${MEMORIA_INSTANCE_ID:-}
      MEMORIA_LOCK_TTL_SECS: ${MEMORIA_LOCK_TTL_SECS:-120}
      MEMORIA_GOVERNANCE_ENABLED: ${MEMORIA_GOVERNANCE_ENABLED:-false}
      MEMORIA_GOVERNANCE_PLUGIN_BINDING: ${MEMORIA_GOVERNANCE_PLUGIN_BINDING:-default}
      MEMORIA_GOVERNANCE_PLUGIN_SUBJECT: ${MEMORIA_GOVERNANCE_PLUGIN_SUBJECT:-system}
      MEMORIA_API_KEY_SECRET: ${MEMORIA_API_KEY_SECRET:-}
      MEMORIA_RATE_LIMIT_AUTH_KEYS: ${MEMORIA_RATE_LIMIT_AUTH_KEYS:-1000,60}
    depends_on:
      matrixone:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      # Current Memoria images may not include curl/wget; keep this process
      # check until the image can self-probe http://localhost:8100/health.
      test: ["CMD-SHELL", "grep -aq 'memoria' /proc/1/cmdline"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  api:
    image: ${ASTRA_IMAGE:-matrixorigin/astra:latest}
    hostname: api
    command: ["astra-server"]
    ports:
      # ASTRA_API_PORT is the host-facing port. The container listens on 17001.
      - "${ASTRA_API_BIND:-127.0.0.1}:${ASTRA_API_PORT:-17001}:17001"
    environment:
      RUST_LOG: ${ASTRA_RUST_LOG:-info}
      ASTRA_API_HOST: 0.0.0.0
      ASTRA_API_PORT: 17001
      ASTRA_CORS_ORIGINS: ${ASTRA_CORS_ORIGINS:-}
      ASTRA_ALLOW_INSECURE_DEFAULTS: ${ASTRA_ALLOW_INSECURE_DEFAULTS:-0}
      ASTRA_AUTO_CREATE_DATABASE: ${ASTRA_AUTO_CREATE_DATABASE:-1}
      ASTRA_DATABASE_BOOTSTRAP_CATALOG: ${ASTRA_DATABASE_BOOTSTRAP_CATALOG:-mysql}
      MATRIXONE_HOST: matrixone
      MATRIXONE_PORT: 6001
      MATRIXONE_USER: ${MATRIXONE_USER:-root}
      MATRIXONE_PASSWORD: ${MATRIXONE_PASSWORD:-111}
      ASTRA_DATABASE: ${ASTRA_DATABASE:-astra_runtime}
      ASTRA_DATABASE_PREFIX: ${ASTRA_DATABASE_PREFIX:-}
      ASTRA_JWT_SECRET: ${ASTRA_JWT_SECRET:?Set ASTRA_JWT_SECRET in deployment/astra-stack/.env}
      ASTRA_JWT_ALGORITHM: ${ASTRA_JWT_ALGORITHM:-HS256}
      ASTRA_JWT_ACCESS_TTL_MINUTES: ${ASTRA_JWT_ACCESS_TTL_MINUTES:-60}
      ASTRA_JWT_REFRESH_TTL_DAYS: ${ASTRA_JWT_REFRESH_TTL_DAYS:-7}
      ASTRA_TOKEN_ENCRYPTION_KEY: ${ASTRA_TOKEN_ENCRYPTION_KEY:?Set ASTRA_TOKEN_ENCRYPTION_KEY in deployment/astra-stack/.env}
      ASTRA_BRIDGE_SECRET: ${ASTRA_BRIDGE_SECRET:?Set ASTRA_BRIDGE_SECRET in deployment/astra-stack/.env}
      MEMORIA_BASE_URL: http://memoria:8100
      MEMORIA_MASTER_KEY: ${MEMORIA_MASTER_KEY:?Set MEMORIA_MASTER_KEY in deployment/astra-stack/.env}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      matrixone:
        condition: service_healthy
      memoria:
        condition: service_healthy
    networks:
      - astra-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:17001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  astra-net:
    driver: bridge

volumes:
  matrixone-data:
    name: ${MATRIXONE_DATA_VOLUME:-astra-stack-matrixone-data}
