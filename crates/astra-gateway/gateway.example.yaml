# ═══════════════════════════════════════════════════════════════════════════════
# Astra Gateway — Example Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# Quick start:
#   1. cp gateway.example.yaml gateway.yaml
#   2. Uncomment and fill in the sections you need
#   3. cargo run -p astra-gateway --release -- --config gateway.yaml
#
# Environment variable overrides (take precedence over YAML values):
#   WECOM_BOT_ID, WECOM_SECRET      — 企微凭证
#   WEIXIN_TOKEN, WEIXIN_ACCOUNT_ID — 微信凭证
#   GATEWAY_DATABASE_URL            — MySQL/MatrixOne storage URL (auto-selects mysql backend)

# ─── Storage ─────────────────────────────────────────────────────────────────
#
# Controls persistence for sessions, cron jobs, reminders, usage tracking,
# credentials, durable tasks, and trace/audit events.
#
# Available backends:
#
#   sqlite    — Lightweight single-file DB (DEFAULT). Zero external deps.
#               Full support: sessions, cron, reminders, usage, credentials,
#               trace (observability), durable tasks.
#
#   mysql     — Same feature set as sqlite, backed by MySQL/MariaDB.
#               Use when multiple gateway instances share one database.
#
#   matrixone — Alias for mysql (MatrixOne is MySQL-protocol compatible).
#
#   file      — JSON files on disk. Single-user friendly, NOT for production.
#               Supports: sessions, cron, reminders, usage.
#               Does NOT support: trace, durable tasks.
#
#   none      — No persistence. State is lost on restart; no cron / reminders.
#
# Omit the whole `storage:` block to get SQLite at ~/.astra-gateway/gateway.db.

storage:
  backend: sqlite
  # path: ~/.astra-gateway/gateway.db    # default path; override as needed

  # ── MySQL / MatrixOne backend (shared / multi-instance) ──
  # backend: mysql
  # url: "mysql://root:password@127.0.0.1:6001/astra_gateway"

  # ── File backend (testing / dev only) ──
  # backend: file
  # dir: /var/lib/astra-gateway/data

  # ── No persistence ──
  # backend: none

# ─── CLI (default agent backend) ─────────────────────────────────────────────
#
# The CLI that handles user messages. Only one `cli:` block is active.
# Users can switch between profiles at runtime with `/cli <name>`.

# ── Option A: Claude-only (minimal, no astra server needed) ──
cli:
  type: claude
  bin: claude                 # full path or just "claude" if on PATH
  model: sonnet              # default model; users override with /model
  stream_json: true           # real-time streaming via --output-format stream-json
                              # emits token/tool progress events to the platform
  extra_args: []              # extra flags injected before -p (e.g. ["--settings", "/path/to/hooks.json"])

# ── Option B: Astra agent (requires astra server running) ──
# cli:
#   type: astra
#   bin: /path/to/astra       # or just "astra" if on PATH
#   permission_mode: auto     # auto | always-ask | never-ask
#   model: "MiniMax-M2.7"

# ── Option C: GitHub Copilot CLI ──
# cli:
#   type: copilot
#   bin: copilot              # full path or just "copilot" if on PATH
#   model: gpt-5.2            # optional; users override with /model
#   stream_json: true         # JSONL events for session/text/usage/tool parsing
#   allow_all_tools: true     # required for unattended non-interactive gateway runs
#   extra_args: []            # e.g. ["--disable-builtin-mcps"] if org policy requires it
#
#   # Optional: explicit, reproducible env injection.
#   # env_file is dotenv-style KEY=VALUE; inline env overrides env_file.
#   # env_file: ~/.astra-gateway/copilot.env
#   # env:
#   #   AWS_REGION: us-east-1
#
#   # Optional: delegate launch behavior to a script. The script receives:
#   #   argv[1] = bin, argv[2..] = gateway-generated Copilot CLI args.
#   # launcher:
#   #   type: script
#   #   path: ~/.astra-gateway/copilot-launcher
#   #   args: []

# Reasoning / thinking output is opt-in per user:
#   /reasoning on
#   /reasoning off
#   /cli <name> thinking-chain
# Only explicit reasoning/thinking events emitted by the selected CLI are shown.

# ── Option D: Custom CLI ──
# cli:
#   type: custom
#   bin: /path/to/my-agent
#   args_template: ["-p", "{message}", "--session", "{session_id}"]
#   json_output: true         # if true, parse stdout as JSON
#   text_field: "response"    # JSON field containing the text reply
#   session_id_field: "sid"   # JSON field containing session ID for continuity

# ─── CLI Profiles (optional, for /cli switching) ────────────────────────────
#
# Define additional CLI backends that users can switch to with `/cli <name>`.
# The default `cli:` above is always available; profiles extend the options.

# cli_profiles:
#   claude:
#     type: claude
#     bin: claude
#     model: claude-sonnet-4-6
#     stream_json: true
#   astra:
#     type: astra
#     bin: /path/to/astra
#     permission_mode: auto
#     model: "MiniMax-M2.7"
#   copilot:
#     type: copilot
#     bin: copilot
#     model: gpt-5.2
#     stream_json: true
#     allow_all_tools: true
#   copilot-script:
#     type: copilot
#     bin: copilot
#     launcher:
#       type: script
#       path: ~/.astra-gateway/copilot-launcher
#       args: []
#     stream_json: true
#     allow_all_tools: true
#   codex:
#     type: codex
#     bin: codex
#     model: o3                        # optional model override
#     sandbox: workspace-write         # read-only | workspace-write | danger-full-access
#     stream_json: true                # JSONL streaming via --json
#     skip_git_repo_check: false
#     ephemeral: false
#     extra_args: []

# ─── Astra Server (only needed if using astra CLI type) ─────────────────────

# astra:
#   base_url: "http://127.0.0.1:8000"
#   api_key: ""
#   default_model: "MiniMax-M2.7"

# ─── Concurrency ────────────────────────────────────────────────────────────
#
# Max parallel CLI runs across all users. Same-session messages still serialize
# to avoid race conditions.

max_concurrent_runs: 4

# ─── Action Policy ──────────────────────────────────────────────────────────
#
# Controls what the gateway can do in response to messages.

action_policy:
  # Allow users to run mutation slash commands (/cron_add, /workspace, etc.)
  allow_slash_mutations: true

  # Allow the LLM to emit [[GATEWAY:...]] tags that modify state.
  # Set to true for autonomous agents, false for safer human-in-the-loop.
  # Requires a persistent storage backend for audit trail.
  allow_model_generated_mutations: false

  # Restrict /workspace and [[GATEWAY:workspace_set]] to these directories.
  # Empty = unrestricted (any path allowed).
  workspace_roots: []
  # workspace_roots:
  #   - /home/user/projects
  #   - /opt/repos

# ─── Claude Code Hooks (optional, for fine-grained event streaming) ─────────
#
# When using `type: claude` with `stream_json: true`, you get real-time
# token and tool events via stdout JSONL. For even more control, you can
# inject Claude Code hooks that fire HTTP callbacks on specific events.
#
# Create a hooks file (e.g. claude-gateway-hooks.json):
#
#   {
#     "hooks": {
#       "PostToolUse": [{
#         "matcher": ".*",
#         "hooks": [{
#           "type": "command",
#           "command": "jq -c '{event:\"tool_done\",tool:.tool_name}' | curl -sf -X POST http://127.0.0.1:7701/hook/tool_done -H 'Content-Type: application/json' -d @- || true"
#         }]
#       }],
#       "Stop": [{
#         "matcher": "",
#         "hooks": [{
#           "type": "command",
#           "command": "jq -c '{event:\"stop\"}' | curl -sf -X POST http://127.0.0.1:7701/hook/stop -H 'Content-Type: application/json' -d @- || true"
#         }]
#       }]
#     }
#   }
#
# Then reference it via extra_args:
#   extra_args: ["--settings", "/absolute/path/to/claude-gateway-hooks.json"]
#
# Available hook types: PreToolUse, PostToolUse, Stop, SubagentStop

# ─── Inject API ──────────────────────────────────────────────────────────────
#
# HTTP endpoint for injecting messages into the gateway programmatically.
# Useful for inter-service communication (e.g. another bot triggering this one).
# Listens on 127.0.0.1 only (not exposed externally).
# Disabled when absent.

# api_port: 9090

# ─── Platforms (at least one must be enabled) ────────────────────────────────

platforms:
  # ── 微信个人号 (iLink Bot API) ──
  # First time: `astra-gateway login-weixin` to scan QR and obtain a token.
  weixin:
    enabled: true
    token: ""                 # paste here or set WEIXIN_TOKEN env var
    account_id: ""            # paste here or set WEIXIN_ACCOUNT_ID env var

  # ── 企业微信 AI Bot ──
  # wecom:
  #   enabled: true
  #   bot_id: ""              # 企微 AI Bot ID or WECOM_BOT_ID env var
  #   secret: ""              # 企微 AI Bot Secret or WECOM_SECRET env var
  #   # websocket_url: "wss://openws.work.weixin.qq.com"  # default, rarely needs changing
