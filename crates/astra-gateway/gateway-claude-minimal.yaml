# Gateway — minimal Claude-only deployment
#
# Features:
#   - SQLite storage (zero external deps, durable by default)
#   - Claude CLI as the only backend
#   - stream-json output for real-time token/tool progress
#   - Claude Code hooks (PostToolUse + Stop) for fine-grained events
#
# Start:
#   cargo run -p astra-gateway --release -- \
#       --config crates/astra-gateway/gateway-claude-minimal.yaml
#
# Required env:
#   WEIXIN_TOKEN      — from: astra-gateway login-weixin
#   WEIXIN_ACCOUNT_ID — from: astra-gateway login-weixin
#   ANTHROPIC_API_KEY — Claude API key (read by the claude CLI)

storage:
  backend: sqlite
  # path: ~/.astra-gateway/gateway.db   # default; uncomment to override

cli:
  type: claude
  bin: claude               # assumes `claude` is on PATH; or set full path
  model: sonnet  # override per-session with /model
  stream_json: true         # enables --output-format stream-json + --include-partial-messages + --include-hook-events
  # Optional: Claude Code hooks for tool/stop event streaming.
  # Uncomment and set absolute path if you want fine-grained events:
  # extra_args:
  #   - "--settings"
  #   - "/path/to/claude-gateway-hooks.json"
  extra_args: []

max_concurrent_runs: 2

action_policy:
  allow_slash_mutations: true
  allow_model_generated_mutations: true
  workspace_roots: []

platforms:
  weixin:
    enabled: true
    token: ""       # set here or via WEIXIN_TOKEN env var
    account_id: ""  # set here or via WEIXIN_ACCOUNT_ID env var
