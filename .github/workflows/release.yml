name: Release Gateway Binaries

on:
  push:
    tags:
      - 'astra-gateway-v*.*.*'
      - 'astra-gateway-v*.*.*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Gateway release tag (e.g. astra-gateway-v0.1.0-rc1); must already exist'
        required: true
        type: string

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^astra-gateway-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid gateway release tag: ${tag}" >&2
            echo "Expected format: astra-gateway-v0.4.1 or astra-gateway-v0.4.1-rc.1" >&2
            exit 1
          fi

          prerelease=false
          if [[ "${tag}" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  test:
    name: Test gate
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/ci.yml

  build:
    name: Build ${{ matrix.target }}
    needs: [validate, test]
    if: always() && needs.validate.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            strip_bin: strip
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            strip_bin: aarch64-linux-gnu-strip
          - target: x86_64-apple-darwin
            os: macos-15-intel
            strip_bin: strip
          - target: aarch64-apple-darwin
            os: macos-15
            strip_bin: strip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install build deps (x86_64-linux-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install strip tool (aarch64-linux-musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p astra-gateway --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p astra-gateway --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/astra-gateway dist/
          ${{ matrix.strip_bin }} dist/astra-gateway 2>/dev/null || true
          cd dist && tar czf ../astra-gateway-${{ matrix.target }}.tar.gz *


      - uses: actions/upload-artifact@v4
        with:
          name: astra-gateway-${{ matrix.target }}
          path: astra-gateway-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec cp {} . \;
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.prerelease }}
          make_latest: false
